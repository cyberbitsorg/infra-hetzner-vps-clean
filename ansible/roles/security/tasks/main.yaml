---
- name: Harden SSH configuration
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
    - { regexp: '^#?ChallengeResponseAuthentication', line: 'ChallengeResponseAuthentication no' }
    - { regexp: '^#?UsePAM', line: 'UsePAM yes' }
    - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
    - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
    - { regexp: '^#?MaxSessions', line: 'MaxSessions 3' }
    - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval 300' }
    - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax 2' }
    - { regexp: '^#?LoginGraceTime', line: 'LoginGraceTime 30' }
    - { regexp: '^#?AllowUsers', line: 'AllowUsers {{ admin_user }}' }
    - { regexp: '^#?Protocol', line: 'Protocol 2' }
    - { regexp: '^#?KbdInteractiveAuthentication', line: 'KbdInteractiveAuthentication no' }
    - { regexp: '^#?AuthenticationMethods', line: 'AuthenticationMethods publickey' }
    - { regexp: '^#?PermitEmptyPasswords', line: 'PermitEmptyPasswords no' }
    - { regexp: '^#?IgnoreRhosts', line: 'IgnoreRhosts yes' }
    - { regexp: '^#?HostbasedAuthentication', line: 'HostbasedAuthentication no' }
    - { regexp: '^#?AllowTcpForwarding', line: 'AllowTcpForwarding no' }
    - { regexp: '^#?AllowAgentForwarding', line: 'AllowAgentForwarding no' }
  notify: restart ssh

- name: Configure SSH ciphers and algorithms
  blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED SSH HARDENING"
    block: |
      Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
      MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com
      HostKeyAlgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256
      KexAlgorithms curve25519-sha256@libssh.org,diffie-hellman-group14-sha256,diffie-hellman-group16-sha512
  notify: restart ssh

- name: Configure UFW defaults
  ufw:
    direction: incoming
    policy: deny
    state: enabled

- name: Configure UFW outgoing defaults
  ufw:
    direction: outgoing
    policy: allow
    state: enabled

- name: Allow SSH through UFW
  ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Allow HTTP through UFW
  ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow HTTPS through UFW
  ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Enable UFW logging
  ufw:
    logging: 'on'
    state: enabled

- name: Configure fail2ban
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
  notify: restart fail2ban

- name: Enable fail2ban
  systemd:
    name: fail2ban
    enabled: yes
    state: started

- name: Remove conflicting sysctl configuration files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/sysctl.d/10-network-security.conf
    - /etc/sysctl.d/99-sysctl.conf
  notify: reload sysctl

- name: Deploy sysctl hardening configuration
  template:
    src: 99-security.conf.j2
    dest: /etc/sysctl.d/99-security.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload sysctl

- name: Configure unattended upgrades
  copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Mail "{{ admin_email }}";
      Unattended-Upgrade::MailReport "on-change";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "true";

- name: Enable automatic updates
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

- name: Disable and stop unnecessary services
  systemd:
    name: "{{ item }}"
    enabled: no
    state: stopped
  loop:
    - multipathd
    - open-iscsi
    - apport
  failed_when: false

- name: Remove unnecessary packages
  apt:
    name:
      - snapd
      - open-iscsi
      - apport
    state: absent
    purge: yes
    autoremove: yes

- name: Enable and start auditd
  systemd:
    name: auditd
    enabled: yes
    state: started

- name: Deploy auditd rules
  copy:
    dest: /etc/audit/rules.d/hardening.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      # Delete all existing rules
      -D

      # Increase buffer size
      -b 8192

      # Watch sensitive file modifications
      -w /etc/passwd -p wa -k identity
      -w /etc/shadow -p wa -k identity
      -w /etc/group -p wa -k identity
      -w /etc/gshadow -p wa -k identity
      -w /etc/sudoers -p wa -k sudoers
      -w /etc/sudoers.d/ -p wa -k sudoers
      -w /etc/ssh/sshd_config -p wa -k sshd_config
      -w /etc/ssh/sshd_config.d/ -p wa -k sshd_config

      # Watch privileged command execution
      -a always,exit -F arch=b64 -S execve -F euid=0 -k root_commands

      # Watch sudo usage
      -w /usr/bin/sudo -p x -k sudo_usage

      # Watch Docker socket
      -w /var/run/docker.sock -p rw -k docker_socket

      # Watch authentication events
      -w /var/log/auth.log -p wa -k auth_log
      -w /var/log/faillog -p wa -k auth_log

      # Watch cron modifications
      -w /etc/cron.d/ -p wa -k cron
      -w /etc/crontab -p wa -k cron
      -w /var/spool/cron/ -p wa -k cron

      # Make rules immutable (requires reboot to change)
      # -e 2
  notify: restart auditd

- name: Enable and start apparmor
  systemd:
    name: apparmor
    enabled: yes
    state: started

- name: Deploy ban summary script
  copy:
    src: ban-summary.sh
    dest: /usr/local/bin/ban-summary
    owner: root
    group: root
    mode: '0755'
  when: smtp_host is defined and smtp_host != ""

- name: Create weekly ban summary cron job
  cron:
    name: "Weekly fail2ban summary"
    minute: "0"
    hour: "9"
    weekday: "1"
    job: "/usr/local/bin/ban-summary '{{ smtp_from }}' '{{ admin_email }}' >> /var/log/ban-summary.log 2>&1"
    user: root
  when: smtp_host is defined and smtp_host != ""
