---
- name: Install msmtp mail relay
  apt:
    name:
      - msmtp-mta
      - bsd-mailx
    state: present

- name: Ensure msmtp log file exists
  copy:
    content: ""
    dest: /var/log/msmtp.log
    owner: root
    group: root
    mode: '0644'
    force: no
  when: smtp_host != ""

- name: Configure msmtp
  template:
    src: msmtprc.j2
    dest: /etc/msmtprc
    owner: root
    group: root
    mode: '0644'
  when: smtp_host != ""

- name: Configure msmtp aliases
  template:
    src: aliases.j2
    dest: /etc/aliases
    owner: root
    group: root
    mode: '0644'
  when: smtp_host != ""

- name: Set up sendmail symlink
  file:
    src: /usr/bin/msmtp
    dest: /usr/sbin/sendmail
    state: link
    force: yes
  when: smtp_host != ""

- name: Test mail configuration on first run
  shell: >
    echo "Subject: Ansible run - VPS Mail Relay Test
    From: {{ smtp_from }}
    To: {{ admin_email }}
    
    This is a test email from your VPS ({{ fqdn }}).
    The mail relay is configured correctly.
    
    Timestamp: $(date)
    Ansible run completed." | /usr/bin/msmtp -t {{ admin_email }}
  when: 
    - smtp_host != ""
    - ansible_connection is not defined or ansible_connection != "local"
  ignore_errors: yes
  changed_when: false
