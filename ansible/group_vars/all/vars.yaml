---
# =============================================================================
# Server Configuration
# =============================================================================

# Sudo password for deployacc (stored in ansible/group_vars/all/vault.yaml)
ansible_become_password: "{{ vault_deployacc_sudo_passwords[inventory_hostname] }}"

# =============================================================================
# Security Settings
# =============================================================================

# Fail2Ban settings
fail2ban_bantime: 86400   # 1 day ban (auto-unban)
fail2ban_findtime: 86400  # 24 hours window to count failures
fail2ban_maxretry: 10     # Ban after 10 failed attempts

# UFW settings
ufw_default_incoming: deny
ufw_default_outgoing: allow
ufw_allowed_ports:
  - 22
  - 80
  - 443
