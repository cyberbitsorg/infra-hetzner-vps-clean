---
- name: Configure VPS - Base Setup
  hosts: vps
  become: yes
  gather_facts: yes

  vars:
    admin_user: "{{ hostvars[inventory_hostname]['admin_username'] | default('admin', true) }}"
    admin_email: "{{ hostvars[inventory_hostname]['admin_email'] | default('admin@example.com', true) }}"
    fqdn: "{{ hostvars[inventory_hostname]['fqdn'] | default('example.com', true) }}"
    base_domain: "{{ hostvars[inventory_hostname]['base_domain'] | default('example.com', true) }}"
    system_email_prefix: "{{ hostvars[inventory_hostname]['system_email_prefix'] | default('fail2ban', true) }}"
    admin_ssh_keys:
      - "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
    timezone: Europe/Amsterdam

  roles:
    - role: common
      tags: ['common', 'base']

    - role: security
      tags: ['security', 'base']

    - role: docker
      tags: ['docker', 'base']

  tasks:
    - name: Display completion message
      debug:
        msg:
          - "VPS is ready!"
          - ""
          - "Reminders after first run:"
          - "  1. Configure DNS: {{ fqdn }} -> {{ ansible_host }}"
          - "  2. Change admin password"
          - ""
          - "SSH: ssh {{ admin_user }}@{{ ansible_host }}"
